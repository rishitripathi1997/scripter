name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'docker-compose.prod.yml'
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/connectx-scripts
            ./scripts/deploy.sh

      - name: Verify health endpoint
        if: success()
        run: |
          curl -fsS --retry 5 --retry-delay 5 --retry-all-errors \
            "http://${{ secrets.DEPLOY_HOST }}/health"
