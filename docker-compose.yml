services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: connectx
      POSTGRES_PASSWORD: connectx
      POSTGRES_DB: connectx_scripts
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectx -d connectx_scripts"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - app_data:/app/data
    environment:
      LOCAL_STORAGE_PATH: /app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
  app_data:
